    <script>
        // 禁用右鍵與開發者工具快捷鍵
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; 
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'P'.charCodeAt(0)) return false; 
        };

        async function downloadWithWatermark() {
            const pdfUrl = '居家護理服務合約書1150325.pdf';
            const btn = document.querySelector('.download-btn');
            
            try {
                btn.innerText = '處理中...';
                btn.disabled = true;

                const response = await fetch(pdfUrl);
                if (!response.ok) throw new Error('無法讀取 PDF 檔案，請確認路徑是否正確');
                const existingPdfBytes = await response.arrayBuffer();

                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfDoc = await PDFDocument.load(existingPdfBytes);
                const helveticaFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

                const now = new Date();
                const timeString = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                const watermarkText = `Reviewed at: ${timeString}`;

                const pages = pdfDoc.getPages();
                pages.forEach(page => {
                    const { width, height } = page.getSize();
                    page.drawText(watermarkText, {
                        x: width - 250,
                        y: height - 30,
                        size: 10,
                        font: helveticaFont,
                        color: rgb(0.8, 0, 0),
                        opacity: 0.6,
                    });
                });

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `健綸合約_審閱存檔_${now.getTime()}.pdf`;
                link.click();

            } catch (err) {
                alert('下載失敗：' + err.message);
            } finally {
                btn.innerText = '⬇ 下載含有審閱時間戳記之 PDF';
                btn.disabled = false;
            }
        }
    </script>
